<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#090f22" />
    <link rel="icon" href="/assets/favcon/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/assets/favcon/favicon.ico" />
    <title>PTC | Scheduled Maintenance</title>
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
      body {
        background: radial-gradient(circle at top, #1f2a44, #0d111a 55%);
      }

      .maintenance-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 120px);
        padding: 20px;
      }

      .maintenance-box {
        background: rgba(19, 26, 42, 0.95);
        border: 1px solid rgba(109, 131, 179, 0.35);
        border-radius: 16px;
        padding: 40px 30px;
        text-align: center;
        max-width: 500px;
        box-shadow: 0 8px 24px rgba(10, 20, 40, 0.18);
      }

      .maintenance-icon {
        font-size: 64px;
        color: #ffa500;
        margin-bottom: 20px;
      }

      .maintenance-box h1 {
        color: #deebff;
        font-size: 28px;
        margin-bottom: 15px;
        font-weight: 700;
      }

      .maintenance-box p {
        color: #9eb4dc;
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 10px;
      }

      .maintenance-status {
        background: rgba(255, 165, 0, 0.1);
        border-left: 4px solid #ffa500;
        padding: 15px;
        margin-top: 20px;
        border-radius: 6px;
        color: #ffd699;
        font-size: 14px;
      }

      .maintenance-box .btn {
        margin-top: 25px;
        display: inline-block;
        padding: 12px 30px;
        background: linear-gradient(90deg, #2f7dff 60%, #41b0ff 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s ease;
      }

      .maintenance-box .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(47, 125, 255, 0.3);
      }
    </style>
  </head>
  <body>
    <div id="layoutInclude"></div>

    <main class="maintenance-container">
      <div class="maintenance-box">
        <div class="maintenance-icon">
          <i class="bi bi-tools"></i>
        </div>
        <h1>Scheduled Maintenance</h1>
        <p>The PTC system is currently under maintenance.</p>
        <p>We are working to improve your experience. Please try again soon.</p>
        <div class="maintenance-status">
          <strong>Status:</strong> Under maintenance<br />
          <small>Expected return: within a few hours</small>
        </div>
        <a href="/dashboard" class="btn">
          <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </main>

    <script src="/js/layout.js"></script>
  </body>
</html>
